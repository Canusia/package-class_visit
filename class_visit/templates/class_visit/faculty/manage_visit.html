<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{{ page_title }}</title>
  {% load static %}
  {% load crispy_forms_tags %}
  <!-- Same CSS the host app loads (cis/base.html) so the form matches the
       app's Bootstrap 4 theme. The previous css/bootstrap.min.css /
       css/all.min.css static paths do not exist, so the page was unstyled. -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
  <link rel="stylesheet" href="{% static 'css/sb-admin-2.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.8.0/css/bootstrap-datepicker.standalone.min.css" integrity="sha512-hUfBXTL9jLIWwdWjS8Ikr/lG7gnGdYddmW98jevEts6e3fHx4uebRBOafkIO/10SqJgxxCTBxUcVUGY8/hIM2g==" crossorigin="anonymous">
</head>
<body class="bg-white">
  <div class="card border-0">
    <div class="card-body">
      <h3 class="card-title">{{ page_title }}</h3>
      <div class="card-text">
        <form id="manage_visit_form" method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <input type="submit" class="btn btn-primary btn-sm" value="Save Visit">
          <button type="button" id="cancel_visit" class="btn btn-sm">Cancel &amp; Close</button>
        </form>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var form = document.getElementById('manage_visit_form');
    function closeModal() {
      if (window.parent && window.parent.closeVisitModal) {
        window.parent.closeVisitModal();
      }
    }
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      fetch(form.action || window.location.href, {
        method: 'POST',
        body: data,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      })
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        if (resp.success) {
          closeModal();
        } else {
          alert(resp.message || 'An error occurred.');
        }
      });
    });
    document.getElementById('cancel_visit').addEventListener('click', closeModal);
  })();
  </script>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.8.0/js/bootstrap-datepicker.min.js" integrity="sha512-cOGL6gI01KK2Bws211W8S3COhzrorBbzKvLPWYOVtSEYet3yG1fzJrimtwh8rUyvMy9qjgY2e7Rt6IwyaiX1Mg==" crossorigin="anonymous"></script>
  <script>
    jQuery(function ($) {
      $('#id_visit_date').datepicker({
        format: 'mm/dd/yyyy',
        autoclose: true,
        todayHighlight: true,
        todayBtn: 'linked'
      });
    });
  </script>
</body>
</html>
