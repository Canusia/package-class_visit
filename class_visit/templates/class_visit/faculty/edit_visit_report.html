<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{{ page_title }}</title>
  {% load static %}
  {% load crispy_forms_tags %}
  <!-- Same CSS the host app loads (cis/base.html) so the form matches the
       app's Bootstrap 4 theme. The previous css/bootstrap.min.css /
       css/all.min.css static paths do not exist, so the page was unstyled. -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
  <link rel="stylesheet" href="{% static 'css/sb-admin-2.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-white">
  <div class="card border-0">
    <div class="card-body">
      <h3 class="card-title">{{ page_title }}</h3>
      {% if existing_report %}
      <p class="text-muted mb-3">Status: <strong>{{ existing_report.status }}</strong></p>
      {% endif %}
      <div class="card-text">
        <form id="report_form" method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="button" class="btn btn-secondary btn-sm" onclick="submitReport('draft')">Save as Draft</button>
          <button type="button" class="btn btn-primary btn-sm" onclick="submitReport('submit')">Submit Report</button>
        </form>
      </div>
    </div>
  </div>

  <script>
  function submitReport(action) {
    var form = document.getElementById('report_form');
    var sa = form.querySelector('[name=submit_action]');
    if (sa) { sa.value = action; }
    var data = new FormData(form);
    fetch(form.action || window.location.href, {
      method: 'POST',
      body: data,
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (resp.success) {
        if (resp.action === 'reload' && window.parent && window.parent.closeVisitModal) {
          window.parent.closeVisitModal();
        } else {
          alert(resp.message);
        }
      } else {
        alert(resp.message || 'An error occurred.');
      }
    });
  }
  </script>
</body>
</html>
